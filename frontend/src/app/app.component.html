<div class="board">

  <div class="column">
    <h2>TODO</h2>

    <div class="card" *ngFor="let card of todo">
      <h4>{{card.titulo}}</h4>
      <p>{{card.descricao}}</p>
    </div>

  </div>

  <div class="column">
    <h2>DOING</h2>

    <div class="card" *ngFor="let card of doing">
      <h4>{{card.titulo}}</h4>
      <p>{{card.descricao}}</p>
    </div>

  </div>

  <div class="column">
    <h2>DONE</h2>

    <div class="card" *ngFor="let card of done">
      <h4>{{card.titulo}}</h4>
      <p>{{card.descricao}}</p>
    </div>

  </div>

</div>
